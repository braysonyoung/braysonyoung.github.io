  <div class="project"
       data-title="The Band Feel"
       data-desc="When I first heard about the chance to see 'The Band Feel' in the 
       Blue Room - a small, ~150 person venue in downtown San Diego - I 
       knew it was worth checking out. After hearing their music for the first time in 
       the car ride to the show, I became pretty excited to see how they would sound live. 
       As I would soon discover, the energy they bring to the stage is incredibly captivating. 
       The unfamilarity actually ended up being part of what made the show so fun, 
       as I was able to enjoy the music without any pre-conceived notions.
       This in combination with
       the band's genre blend and technical skill made for a great experience with 
       my dad and a friend. 
  <br><br>
       Using pictures I took at the show, I wanted to capture 
       the energy of this performance in poster form while conveying the musical 
       skill and funk they brought to the stage. I decided to present this in the form of 
       a fake social media post, as I thought it would be a fun way to 
       deliver information on the performance through a unique medium. 
       <br><br>
       The lighting 
       at the venue created some unique contrast in my poster in a pretty natural way; 
       as the name suggests, the blue environment of the venue set a nice backdrop 
       behind the warm, 70s looking stage lights. After doing some simple 
       image editing and organizational work, a rough draft of the 
       poster came together and eventually evolved into what you see now.
       "
       data-img="Images/SamplePostFeel.png">
    <img src="Images/SamplePostFeel.png" alt="Project 1">

<div class="hint">
  Click me!
</div>
    
  </div>

  <div class="project"
       data-title="Summer of Loud 2025"
       data-desc="The Summer of Loud was a music festival in San Diego that featured 
       a lineup of some of the biggest hard rock names in America.
       Although we arrived a bit late and missed the first couple bands, 
       my dad and I had a blast at this outdoor festival in the open air right
       next to Petco Park. The energy was really great and the music was loud and fun.
       <br><br>
       I am honestly really happy with how this poster turned out, as I never thought 
       any of the pitures my dad and I were taking would look so professional.
       As I was deciding between this image and a few others, I realized that the 
       clean stage background contrasting with the energy of 
       Winston McCall (lead singer of Parkway Drive) was something special. 
      <br><br>
      Although I initially wanted to keep this poster 100% original and not use any 
      outside material, I ended up using the festival and bands' logos to 
      make the content a bit more informative and fit the vibe of the show itself.
      After some simple masking and color grading in an attempt to fix 
      the flaws of a fully zoomed-in iPhone camera, I started
      to see the vision. 
      Overall, the main image is one of my favorites out of all of my posters."
       data-img="Images/SamplePostLoud.png">
    <img src="Images/SamplePostLoud.png" alt="Project 2">
  </div>

  <div class="project"
       data-title="J Cole - The Fall-Off Tour"
       data-desc="As I'm originally from San Diego, I couldn't pass
       up the opportunity to highlight a 
       big time performance at a venue about 15 minutes 
       from my house. I've become super excited 
       about the energy and narrative surounding
       J Cole's Fall-Off Tour after listening to his new album of the same name.
       Among the many complex topics the album deals with,
      I really liked the statement of reflecting on an artist's inevitable 
      decline. Although I understand that it's nearly impossible to 
      convey the entire message of the album in a simple poster,
      I wanted to make it as visually appealing as possible to promote the 
      album's depth. 

       <br><br>
       Unfortunately, I did not take any of the photos 
       that I used in this poster as I haven't seen him live yet. 
       I instead found some really great ones 
       online and used those as a home base to work around. 
       The main goal was to reflect J Cole's artist identity and stage presence
       while practicing skills in design and branding. 
       "
       data-img="Images/SampleJCole.png">
    <img src="Images/SampleJCole.png" alt="Project 4">
  </div>

  <div class="project"
       data-title="Jack Kays Poster"
       data-desc="This might be my favorite poster that I've made so far. 
       I took these images 
       of Jack Kays in February 2025 in Nashville at a venue called The Basement East. 
       The environment was really great and the space was packed. 
       Aside from the high energy music, my favorite part of the 
       show was the lighting, as it was really dynamic and colorful. My main goal with 
       this poster was to convey that same hazy, vigorous feeling. 
       <br><br>
       Technically speaking, I really feel the need to invest too 
       much into pulling that 
       nebulous feeling out of the poster - the raw images and lighting did most of the 
       work for me. I did, however, have to use lots of masking and layers in order for 
       the subject pop out from the background of the poster. I think my biggest 
       challenge was figuring out what to do with the text and how to make feel like 
       it belonged in the poster. I'm still not sure I achieved that as well as I wanted to, 
       so things are subject to change.   
        "
       data-img="Images/JackKaysPoster.png">
    <img src="Images/JackKaysPoster.png" alt="Project 5">
  </div>

  <div class="project"
       data-title="Ron Carter in NYC"
       data-desc="Over the summer of 2023, I was in the New York area for a few days 
       with my dad. We had the opportunity to see Ron Carter, one of the most 
       influential jazz bassists of all time in the legendary Blue Note Jazz Club.
       Our table was about 10 feet from the stage, so we had an amazing view of the 
       performance and were able to take some great pictures as well. 
       <br><br>
       The original picture that I used in this poster was already really solid, 
       with the only flaw being some distracting background/foreground 
       elements and wierd color profiles. 
       I spent a few hours experimenting with this image using some 
       creative editing and masking in order 
       to curate the unique pallette and texture you see now.
        To add some more personality to the poster, I blended in some 
        swirly designs in the background that I thought fit the vibe
         of both the show and the poster itself. After adding textual information,
         I finished with some static/textural overlays to add the final 
         creative touch to the piece.
       "
       data-img="Images/RonCarterPoster.jpeg">
    <img src="Images/RonCarterPoster.jpeg" alt="Project 6">
  </div>

  <div class="project"
       data-title="A Gig at Vermillion"
       data-desc="As you might be able to tell, this poster I made for my band's 
       upcoming show hints at an Easter theme. The initial idea of this poster 
       formed under the restriction that we didn't actually have any promotional 
       images of ourselves as a group, so I had to rely only on digital drawing 
       and original graphics to make this poster. 
       <br><br>
       Wanting to make something that 
       lent itself to the fun and diverse set we had created for this Easter gig, the 
       playful nature of this poster was born. Although it's not the most 
       interesting poster I've made, I think the color pallette and nature of 
       the piece served its purpose well and fit the vibe of the show. I also 
       had fun making it and working with a slightly different 'format' than 
       I usually do. I actually made a few alternate versions of this poster;
        they're all 'cut from the same cloth' so to speak, but have their differences.
 "
       data-img="Images/VudapestVermillion.png">
    <img src="Images/VudapestVermillion.png" alt="Project 7">
  </div>

  <div class="project"
       data-title="Acura NSX"
       data-desc="Obviously, this poster is a bit different than the others - 
       there's no music or performance involved and it's not promoting anything. 
        Instead, I was inspired to create this poster after going to a car show 
        with my friends in early April 2025 in Redmond, Washington. This was by far the
        biggest and most impressive car show I've ever been to, as there were 
        hundreds of cars probably totalling at least 150 million. 
        <br><br>
        Among the F40s and 1 of 1 track cars, this Acura NSX stood out to me 
        as a well-presented piece of art. As it is one of my favorite cars of all time,
        I wanted to create a poster that showed off the sleek, angular lines
        of the front end. This also happened to be one of the best pictures I took that day. 
        To add a bit more character to the poster, i did some creative color processing and 
        layering work along with adding some textual elements. 

       "
       data-img="Images/AcuraNSX.jpeg">
    <img src="Images/AcuraNSX.jpeg" alt="Project 8">
  </div>

<!-- modal pop up page  -->



<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close">&times;</span>

    <div class="modal-body">
      <img id="modal-img" src="" alt="">
      <div class="modal-text">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
      </div>
    </div>
  </div>
</div>

<script>
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const modalTitle = document.getElementById("modal-title");
const modalDesc = document.getElementById("modal-desc");
const closeBtn = document.querySelector(".close");

document.querySelectorAll(".project").forEach(project => {
  project.addEventListener("click", () => {
    modal.style.display = "block";
    

    modalImg.src = project.dataset.img;
    modalTitle.textContent = project.dataset.title;
    modalDesc.innerHTML = project.dataset.desc;
  });
});

closeBtn.addEventListener("click", () => {
  modal.style.display = "none";
});

window.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});

</script>








<script>
window.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    document.querySelectorAll(".project").forEach(project => {
      project.classList.add("show-hint");
    });
  }, 5000); // 5 seconds
});
</script>
